<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <div class="container">
        <h1 class="bg-title-h1">Student Registration Form</h1>

    <legend class="bg-sub-title">Personal Information</legend>
         <fieldset class="border border-light-subtle p-3">

            <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-4">
    <label for="validationCustom01" class="form-label">First name:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustom02" class="form-label">Last name:</label>
    <input type="text" class="form-control" id="validationCustom02" value="" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustomUsername" class="form-label">Username:</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
        Please choose a username.
      </div>
    </div>
  </div>
  
  <div class="col-md-6">
    <label for="validationCustom03" class="form-label">Address:</label>
    <input type="text" class="form-control" id="validationCustom03" required>
    <div class="invalid-feedback">
      Please provide a valid Address.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom05" class="form-label">City:</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
      Please provide a valid city.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom04" class="form-label">Province:</label>
    <select class="form-select" id="validationCustom04" required>
      <option selected disabled value="">Choose Option</option>
      <option>Western Province</option>
      <option>Central Province</option>
      <option>Southern Province</option>
      <option>Northern Province</option>
      <option>Eastern Province</option>
      <option>North Western Province</option>
      <option>North Central Province</option>
      <option>Uva Province</option>
      <option>Sabaragamuwa Province</option> 
    </select>
    <div class="invalid-feedback">
      Please select a valid Province.
    </div> 
  </div>

  <div class="col-md-6">
    <label for="validationCustom03" class="form-label">Nationality:</label>
    <input type="text" class="form-control" id="validationCustom03" required>
   
  </div>
  <div class="col-md-3">
    <label for="validationCustom05" class="form-label">NIC/Passport Number:</label>
    <input type="text" class="form-control" id="validationCustom05" required>
   
  </div>
  <div class="col-md-3">
    <label for="validationCustom04" class="form-label">Gender:</label>
    <select class="form-select" id="validationCustom04" required>
      <option selected disabled value="">Choose Option</option>
      <option>Male</option>
      <option>Female</option>
      </select>
  </div>
  </fieldset>

  
    <legend class="bg-sub-title">Contact Information</legend>
     <fieldset class="border border-light-subtle p-3">

        <div class="col-md-12">
    <label for="validationCustom01" class="form-label">Email Address:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
       </div>

    <div class="row">
     <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Mobile Number:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
     <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Alternative Mobile Number:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
    </div>

        <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Postal Code:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
     </fieldset>

    <legend class="bg-sub-title">Parents/Guardian Information</legend>
     <fieldset class="border border-light-subtle p-3">

         <div class="col-md-12">
    <label for="validationCustom01" class="form-label">Parent Name:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>

     <div class="row">
       <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Mobile Number:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
       <div class="col-md-6">
    <label for="validationCustom01" class="form-label">NIC/Passport Number:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
    </div>

    <div class="row">
       <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Email Address:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
       <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Occupation:</label>
    <input type="text" class="form-control" id="validationCustom01" value="" required>
        </div>
    </div>
 </fieldset>

  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
      <label class="form-check-label" for="invalidCheck">
        Agree to terms and conditions
      </label>
      <div class="invalid-feedback">
        You must agree before submitting.
      </div>
    </div>
  </div>
  <br>
  
  <div class="col-12">
      <button type="submit" class="btn btn-primary">Submit</button>
  </div>
</form>
</div>
</body>
</html>
